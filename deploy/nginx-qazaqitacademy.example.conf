# Пример для Nginx на VPS (Ubuntu/Debian).
# Учебный проект: Жандос Сахиев · LMS Platform
#
# Порты в Docker (docker-compose.vps.yml):
#   - фронт Next.js  → 3000 на хосте (то, что видит пользователь в браузере)
#   - бэкенд FastAPI → 8000 (внутри сети Docker; наружу не обязателен, если фронт проксирует /api)
#
# Скопируйте в sites-available, поправьте порт если у вас override (например 3010):
#   sudo cp deploy/nginx-qazaqitacademy.example.conf /etc/nginx/sites-available/qazaqitacademy-edu.pp.ua
#   sudo ln -sf /etc/nginx/sites-available/qazaqitacademy-edu.pp.ua /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Затем: sudo certbot --nginx -d qazaqitacademy-edu.pp.ua -d www.qazaqitacademy-edu.pp.ua
#
# В .env.deploy укажите ALLOWED_ORIGINS и FRONTEND_PUBLIC_URL с https:// и этим доменом.

server {
    listen 80;
    server_name qazaqitacademy-edu.pp.ua www.qazaqitacademy-edu.pp.ua;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
